.dot-green{background:#34D399}

.dot-red{background:#F87171}

.search-input{width:280px;padding:8px 12px;background:#151922;border:1px solid #334155;border-radius:8px;color:#E2E8F0;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}

.search-input::placeholder{color:#475569}
.filter-btn{padding:7px 14px;background:#151922;border:1px solid #334155;border-radius:8px;color:#94A3B8;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:#475569;color:#CBD5E1}

.tab-btn{padding:10px 20px;background:none;border:none;border-right:1px solid #1E293B;color:#64748B;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:last-child{border-right:none}
.tab-btn:hover{color:#CBD5E1}
.tab-btn.active{background:#3B82F6;color:#fff;border-radius:9px}
.tab-btn .cnt{opacity:.6;margin-left:2px}

.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid #1E293B}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#151922;padding:10px 14px;text-align:left;font-weight:600;color:#94A3B8;border-bottom:1px solid #1E293B;white-space:nowrap;cursor:pointer;user-select:none;font-size:11px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:10}
thead th:hover{color:#CBD5E1}
thead th .arrow{font-size:9px;margin-left:3px;opacity:.3}
thead th.sorted .arrow{opacity:1;color:#3B82F6}
tbody tr{border-bottom:1px solid #1E293B;transition:background .1s}
tbody tr:hover{background:#1a1f2e}
tbody td{padding:9px 14px;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:12px;color:#CBD5E1}
td.name-col{white-space:normal;min-width:340px;max-width:400px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;color:#F8FAFC}
td.idx-col{min-width:36px;text-align:center;color:#475569;font-size:11px}
td.num{text-align:right}

/* Sticky columns */
th.stick-idx,td.stick-idx{position:sticky;left:0;z-index:5;background:#151922}
th.stick-name,td.stick-name{position:sticky;left:36px;z-index:5;background:#151922}
th.stick-idx,th.stick-name{z-index:11}
tbody tr:hover td.stick-idx,tbody tr:hover td.stick-name{background:#1a1f2e}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-weight:600;font-size:12px;font-family:'JetBrains Mono',monospace}
.wk{background:rgba(52,211,153,.15);color:#34D399}
.of{background:rgba(251,191,36,.15);color:#FBBF24}
.ak{background:rgba(248,113,113,.15);color:#F87171}
.nd{color:#475569}

/* Status badges */
.status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif}
.status-winner{background:rgba(52,211,153,.15);color:#34D399}
.status-loser{background:rgba(248,113,113,.15);color:#F87171}
.status-testing{background:rgba(96,165,250,.15);color:#60A5FA}
.status-fence{background:rgba(251,191,36,.15);color:#FBBF24}
.status-paused{background:rgba(71,85,105,.15);color:#94A3B8}

/* View link */
.view-link{color:#60A5FA;text-decoration:none;font-family:'DM Sans',sans-serif;font-size:11px;display:inline-flex;align-items:center;gap:3px;transition:color .15s}

.view-link svg{width:11px;height:11px}
.no-link{color:#475569}

/* Row count */
.row-count{text-align:right;color:#475569;font-size:12px;margin-top:8px;font-family:'DM Sans',sans-serif}

/* Tab panels */
.tab-panel{display:none}
.tab-panel.active{display:block}
</style>

// ======================== CONFIG ========================
const KPI = {
  cpqa: {green:500, yellow:600},
  hookRate: {green:20, yellow:15},
  holdRate: {green:20, yellow:15}
};

const TABS = [
  {id:'videos', label:'Video Variations', data:DATA_VIDEOS, isVideo:true, isConcept:false},
  {id:'statics', label:'Static Variations', data:DATA_STATICS, isVideo:false, isConcept:false},
  {id:'copy', label:'Copy', data:DATA_COPY, isVideo:false, isConcept:false},
  {id:'staticConcepts', label:'Static Concepts', data:DATA_STATIC_CONCEPTS, isVideo:false, isConcept:true},
  {id:'videoConcepts', label:'Video Concepts', data:DATA_VIDEO_CONCEPTS, isVideo:true, isConcept:true}
].filter(t => t.data.length > 0);

// ======================== STATE ========================
let activeTab = TABS[0].id;
let sortCol = 'cost';
let sortAsc = false;
let searchQ = '';
let filterWinners = false;
let filterSpend = false;

// ======================== KPI BADGE ========================
function ccBadge(v, metric) {
  if (v == null || v === 0) return 'nd';
  const k = KPI[metric];
  if (!k) return 'nd';
  if (metric === 'hookRate' || metric === 'holdRate') {
    return v >= k.green ? 'wk' : v >= k.yellow ? 'of' : 'ak';
  }
  return v <= k.green ? 'wk' : v <= k.yellow ? 'of' : 'ak';
}

// ======================== FORMAT ========================
const fmtD = v => v != null ? '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : null;
const fmtD0 = v => v != null ? '$'+Math.round(v).toLocaleString('en-US') : null;
const fmtN = v => v != null ? v.toLocaleString('en-US') : null;
const fmtP1 = v => v != null ? v.toFixed(1)+'%' : null;
const fmtP2 = v => v != null ? v.toFixed(2)+'%' : null;
const fmtComma = v => v != null ? Math.round(v).toLocaleString('en-US') : null;
const dash = '<span class="nd">\u2014</span>';

function viewLink(url) {
  if (!url) return '<span class="no-link">\u2014</span>';
  return `<a class="view-link" href="${url}" target="_blank" rel="noopener">View <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.5 1.5h7v7M10.5 1.5L1.5 10.5"/></svg></a>`;
}

function badgeHTML(v, metric, formatter) {
  if (v == null) return dash;
  const cls = ccBadge(v, metric);
  if (cls === 'nd') return dash;
  return `<span class="badge ${cls}">${formatter(v)}</span>`;
}

// ======================== COLUMNS ========================
function getCols(tab) {
  const t = TABS.find(x => x.id === tab);
  const cols = [
    {key:'idx', label:'#', sortable:false, sticky:'stick-idx'},
    {key:'name', label:'Name', sortable:true, sticky:'stick-name'},
    {key:'link', label:'Ad', sortable:false},
  ];
  if (t.isConcept) {
    cols.push({key:'variations', label:'# Ads', sortable:true});
  }
  cols.push(
    {key:'cost', label:'Spend', sortable:true},
    {key:'leads', label:'Leads', sortable:true},
    {key:'cpl', label:'CPL', sortable:true},
    {key:'qa', label:'QA', sortable:true},
    {key:'cpqa', label:'CPQA', sortable:true},
    {key:'mql', label:'MQL', sortable:true},
    {key:'cpmql', label:'CPMQL', sortable:true},
    {key:'sql', label:'SQL', sortable:true},
    {key:'cpsql', label:'CPSQL', sortable:true},
    {key:'cust', label:'Cust', sortable:true},
    {key:'cac', label:'CAC', sortable:true}
  );
  if (t.isVideo) {
    cols.push(
      {key:'hookRate', label:'Hook %', sortable:true},
      {key:'holdRate', label:'Hold %', sortable:true}
    );
  }
  cols.push(
    {key:'ctrAll', label:'CTR (all)', sortable:true},
    {key:'ctrLink', label:'CTR (link)', sortable:true},
    {key:'cpm', label:'CPM', sortable:true},
    {key:'impr', label:'Impressions', sortable:true}
  );
  return cols;
}

// ======================== RENDER ========================
function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = TABS.map(t =>
    `<button class="tab-btn${t.id===activeTab?' active':''}" onclick="switchTab('${t.id}')">${t.label} <span class="cnt">(${t.data.length})</span></button>`
  ).join('');
}

function switchTab(id) {
  activeTab = id;
  sortCol = 'cost';
  sortAsc = false;
  renderTabs();
  updateLegend();
  renderTable();
}

function updateLegend() {
  const t = TABS.find(x => x.id === activeTab);
  let html = `
    <div class="legend-item"><span class="legend-dot dot-green"></span> CPQA &le; $500</div>
    <div class="legend-item"><span class="legend-dot dot-yellow"></span> CPQA $500&ndash;$600</div>
    <div class="legend-item"><span class="legend-dot dot-red"></span> CPQA &gt; $600</div>
    <div class="legend-item"><span class="legend-dot dot-gray"></span> No Data</div>`;
  if (t && t.isVideo) {
    html += `
    <div class="legend-item"><span class="legend-dot dot-green"></span> Hook/Hold &ge; 20%</div>
    <div class="legend-item"><span class="legend-dot dot-yellow"></span> Hook/Hold 15&ndash;20%</div>
    <div class="legend-item"><span class="legend-dot dot-red"></span> Hook/Hold &lt; 15%</div>`;
  }
  document.getElementById('legend').innerHTML = html;
}

function renderTable() {
  const t = TABS.find(x => x.id === activeTab);
  if (!t) return;
  const cols = getCols(activeTab);
  let rows = [...t.data];

  // Filter
  if (searchQ) {
    const q = searchQ.toLowerCase();
    rows = rows.filter(r => r.name.toLowerCase().includes(q));
  }
  if (filterWinners) {
    rows = rows.filter(r => r.cpqa != null && r.cpqa > 0 && r.cpqa <= 500);
  }
  if (filterSpend) {
    rows = rows.filter(r => r.cost != null && r.cost >= 500);
  }

  // Sort
  rows.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });

  const totalRows = rows.length;

  // Build table
  let html = '<table><thead><tr>';
  cols.forEach(c => {
    const stickyClass = c.sticky ? ' '+c.sticky : '';
    const sortedClass = c.key === sortCol ? ' sorted' : '';
    const arrow = c.sortable ? `<span class="arrow">${c.key===sortCol?(sortAsc?'\u25B2':'\u25BC'):'\u25B2'}</span>` : '';
    const onclick = c.sortable ? ` onclick="doSort('${c.key}')"` : '';
    html += `<th class="${stickyClass}${sortedClass}"${onclick}>${c.label}${arrow}</th>`;
  });
  html += '</tr></thead><tbody>';

  rows.forEach((r, i) => {
    html += '<tr>';
    cols.forEach(c => {
      const stickyClass = c.sticky ? ' '+c.sticky : '';
      switch(c.key) {
        case 'idx':
          html += `<td class="idx-col${stickyClass}">${i+1}</td>`;
          break;
        case 'name':
          html += `<td class="name-col${stickyClass}">${r.name}</td>`;
          break;
        case 'link':
          html += `<td>${viewLink(r.link)}</td>`;
          break;
        case 'variations':
          html += `<td class="num">${r.variations||dash}</td>`;
          break;
        case 'cost':
          html += `<td class="num">${r.cost!=null?fmtD(r.cost):dash}</td>`;
          break;
        case 'leads':
        case 'qa':
        case 'mql':
        case 'sql':
        case 'cust':
          html += `<td class="num">${r[c.key]!=null?fmtN(r[c.key]):dash}</td>`;
          break;
        case 'cpl':
        case 'cpmql':
        case 'cpsql':
        case 'cac':
          html += `<td class="num">${r[c.key]!=null?fmtD0(r[c.key]):dash}</td>`;
          break;
        case 'cpqa':
          html += `<td class="num">${badgeHTML(r.cpqa,'cpqa',fmtD0)}</td>`;
          break;
        case 'hookRate':
          html += `<td class="num">${badgeHTML(r.hookRate,'hookRate',fmtP1)}</td>`;
          break;
        case 'holdRate':
          html += `<td class="num">${badgeHTML(r.holdRate,'holdRate',fmtP1)}</td>`;
          break;
        case 'ctrAll':
          html += `<td class="num">${r.ctrAll!=null?fmtP2(r.ctrAll):dash}</td>`;
          break;
        case 'ctrLink':
          html += `<td class="num">${r.ctrLink!=null?fmtP2(r.ctrLink):dash}</td>`;
          break;
        case 'cpm':
          html += `<td class="num">${r.cpm!=null?fmtD(r.cpm):dash}</td>`;
          break;
        case 'impr':
          html += `<td class="num">${r.impr!=null?fmtComma(r.impr):dash}</td>`;
          break;
        default:
          html += `<td class="num">${dash}</td>`;
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';

  // Panel
  const panelsDiv = document.getElementById('panels');
  panelsDiv.innerHTML = `
    <div class="tab-panel active">
      <div class="table-wrap">${html}</div>
      <div class="row-count">${totalRows} of ${t.data.length} creatives</div>
    </div>`;
}

function doSort(col) {
  if (sortCol === col) {
    sortAsc = !sortAsc;
  } else {
    sortCol = col;
    sortAsc = false;
  }
  renderTable();
}

function toggleFilter(type) {
  if (type === 'winners') {
    filterWinners = !filterWinners;
    document.getElementById('btnWinners').classList.toggle('active', filterWinners);
  } else if (type === 'spend') {
    filterSpend = !filterSpend;
    document.getElementById('btnSpend').classList.toggle('active', filterSpend);
  }
  renderTable();
}

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  renderTable();
});
